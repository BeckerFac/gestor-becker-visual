<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GESTIA - Gestion Empresarial</title>

  <!-- PWA meta tags -->
  <meta name="theme-color" content="#0A0A0F">
  <meta name="description" content="Sistema de gestion integral para PyMEs argentinas">

  <!-- Apple PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GESTIA">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="GESTIA - Gestion Empresarial">
  <meta property="og:description" content="Sistema de gestion integral para PyMEs argentinas. Facturacion AFIP, pedidos, cobros, inventario y mas.">
  <meta property="og:image" content="/icons/icon-512x512.png">
  <meta property="og:url" content="https://gestia.app">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
</head>
<body>
  <div id="root"></div>
  <script>
    // Auto-recovery: detect blank page and fix it
    // This runs BEFORE React — catches SW cache issues
    (function() {
      var RECOVERY_KEY = '__gestia_recovery';
      var recoveryAttempt = parseInt(sessionStorage.getItem(RECOVERY_KEY) || '0');

      function recover() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) return; // React rendered OK

        if (recoveryAttempt >= 2) {
          // Already tried twice — show manual message
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:12px;background:#0A0A0F;color:white"><p>Actualizando aplicacion...</p><p style="font-size:13px;color:#999">Limpiando cache</p></div>';
          sessionStorage.removeItem(RECOVERY_KEY);
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(reg){reg.unregister()})});
            caches.keys().then(function(n){n.forEach(function(name){caches.delete(name)})});
          }
          setTimeout(function(){ location.href = location.origin + '/dashboard'; }, 2000);
          return;
        }

        sessionStorage.setItem(RECOVERY_KEY, String(recoveryAttempt + 1));
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(reg){reg.unregister()})});
          caches.keys().then(function(n){n.forEach(function(name){caches.delete(name)})});
        }
        setTimeout(function(){ location.reload(); }, 500);
      }

      // Check after 3 seconds
      setTimeout(recover, 3000);

      // Also cancel if React renders
      var obs = new MutationObserver(function() {
        if (document.getElementById('root').children.length > 0) {
          sessionStorage.removeItem(RECOVERY_KEY);
          obs.disconnect();
        }
      });
      obs.observe(document.getElementById('root'), { childList: true });
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
