<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GESTIA - Gestion Empresarial</title>

  <!-- PWA meta tags -->
  <meta name="theme-color" content="#0A0A0F">
  <meta name="description" content="Sistema de gestion integral para PyMEs argentinas">

  <!-- Apple PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GESTIA">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="GESTIA - Gestion Empresarial">
  <meta property="og:description" content="Sistema de gestion integral para PyMEs argentinas. Facturacion AFIP, pedidos, cobros, inventario y mas.">
  <meta property="og:image" content="/icons/icon-512x512.png">
  <meta property="og:url" content="https://gestia.app">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
</head>
<body>
  <div id="root"></div>
  <script>
    // Auto-recovery: detect blank page / stale SW cache / JS load errors
    (function() {
      var RECOVERY_KEY = '__gestia_recovery';
      var recoveryAttempt = parseInt(sessionStorage.getItem(RECOVERY_KEY) || '0');
      var recovered = false;

      function nukeSwAndReload(showMsg) {
        if (recovered) return;
        recovered = true;
        if (showMsg) {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:12px;background:#0A0A0F;color:white"><p>Actualizando...</p><p style="font-size:13px;color:#999">Limpiando cache</p></div>';
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(reg){reg.unregister()})});
          caches.keys().then(function(n){n.forEach(function(name){caches.delete(name)})});
        }
        if (recoveryAttempt >= 2) {
          sessionStorage.removeItem(RECOVERY_KEY);
          setTimeout(function(){ location.href = location.origin + '/dashboard'; }, 1500);
        } else {
          sessionStorage.setItem(RECOVERY_KEY, String(recoveryAttempt + 1));
          setTimeout(function(){ location.reload(); }, 400);
        }
      }

      // Catch JS module load errors (stale SW serving 404 for new asset hashes)
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.indexOf('Failed to fetch') !== -1 || e.message.indexOf('Loading module') !== -1 || e.message.indexOf('Importing a module') !== -1 || e.message.indexOf('dynamically imported') !== -1)) {
          nukeSwAndReload(true);
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = (e.reason && (e.reason.message || String(e.reason))) || '';
        if (msg.indexOf('Failed to fetch') !== -1 || msg.indexOf('Loading chunk') !== -1 || msg.indexOf('dynamically imported') !== -1) {
          nukeSwAndReload(true);
        }
      });

      // Blank page check at 1.5s
      setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          nukeSwAndReload(recoveryAttempt >= 1);
        }
      }, 1500);

      // Cancel recovery once React renders
      var obs = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          sessionStorage.removeItem(RECOVERY_KEY);
          recovered = true;
          obs.disconnect();
        }
      });
      obs.observe(document.getElementById('root'), { childList: true });
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
