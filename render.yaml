services:
  - type: web
    name: gestor-becker-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: AFIP_ENV
        value: homologacion
      - key: AFIP_CUIT
        value: "20123456789"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: noreply@gestorbecker.com
      - key: SMTP_PASS
        value: test123
      - key: LOG_LEVEL
        value: info

databases:
  - name: postgres
    plan: free
