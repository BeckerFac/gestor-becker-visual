databases:
  - name: gestor-becker-db
    plan: free
    databaseName: gestor_becker
    user: gestor_user

services:
  - type: web
    name: gestor-becker-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-becker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: AFIP_ENV
        value: homologacion
      - key: LOG_LEVEL
        value: info

  # Frontend is now served by the backend (monolith deployment)
  # Remove the old static site service from Render dashboard manually
